<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage 2025</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hero-panel">
      <header class="hero-header">
        <h1>STAGE 2025</h1>
      </header>

      <div class="hero-content">
        <div class="character-zone">
          <div class="city-noise" aria-hidden="true"></div>
          <div class="avatar-card" role="img" aria-label="Avatar stylise de developpeuse">
            <img class="avatar-photo" src="images/Mizuki.png" alt="Illustration principale du portfolio">
            <div class="avatar-glow"></div>
            <div class="avatar-scanline"></div>
          </div>
          <div class="intro-tag">
            <p>CHAPITRE 2025</p>
            <h2>MONTEE EN COMPETENCES</h2>
            <span>Resume des missions, outils et competences de l annee 2025.</span>
          </div>
        </div>

        <aside class="menu-zone" aria-label="Navigation stage 2025">
          <button class="cta-btn" id="backToStagesBtn" type="button">CHAPITRES</button>
          <button class="cta-btn" id="backBtn" type="button">MENU</button>
        </aside>
      </div>
    </section>

    <section class="info-panel" aria-live="polite">
      <article class="info-card active">
        <h3>BILAN 2025</h3>
        <p>
          Ajoute ici ton contenu 2025: nouvelles responsabilites, projets menes,
          niveau d autonomie et resultats obtenus pendant le stage.
        </p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
