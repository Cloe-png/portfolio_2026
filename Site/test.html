<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - Question/Réponse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .faq-container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .faq-item {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }

        .faq-question {
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faq-question:hover {
            color: #007BFF;
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }

        .faq-answer.active {
            max-height: 200px; /* Ajustable selon le contenu */
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="faq-container">
        <div class="faq-item">
            <div class="faq-question">❓ </div>
            <div class="faq-answer"></div>
        </div>

        <div class="faq-item">
            <div class="faq-question">❓ </div>
            <div class="faq-answer">💻 </div>
        </div>

        <div class="faq-item">
            <div class="faq-question">❓ </div>
            <div class="faq-answer">💻 </div>
        </div>
        <div class="faq-item">
            <div class="faq-question">❓ </div>
            <div class="faq-answer">💻 </div>
        </div>

    </div>

    <script>
        document.querySelectorAll('.faq-question').forEach(question => {
            question.addEventListener('click', () => {
                const answer = question.nextElementSibling;
                answer.classList.toggle('active');
            });
        });
    </script>

</body>
</html>
