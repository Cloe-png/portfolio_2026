<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Enter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
    crossorigin="anonymous"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;600;700&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css?v=6">
</head>
<body>
  <div class="boot-sequence" aria-hidden="true">
    <div class="boot-sequence__noise"></div>
    <div class="boot-sequence__flash"></div>
    <div class="boot-sequence__core">
      <p class="boot-sequence__label">System Boot</p>
      <h2 class="boot-sequence__title">Loading Portfolio</h2>
      <div class="boot-sequence__bar">
        <span class="boot-sequence__fill"></span>
      </div>
      <p class="boot-sequence__status">Initializing portfolio...</p>
    </div>
  </div>

  <main class="entry-slider" data-entry-theme="cyan">
    <header class="chapter-topbar">
      <span class="chapter-brand chapter-brand-static">Clo&eacute; Wlodarski-Zminka</span>
      <nav class="chapter-nav chapter-nav-static" aria-label="Navigation decorative">
        <span class="is-active">Home</span>
        <span>Pr&eacute;sentation</span>
        <span>Stages</span>
        <span>Veille techno</span>
        <span>Projets perso</span>
        <span>Avenir</span>
        <span class="chapter-dots-btn chapter-dots-static" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </nav>
    </header>

    <section class="entry-stage">
      <div class="entry-aura"></div>
      <div class="entry-ghost">ENTER</div>

      <div class="entry-copy entry-copy-left">
        <p class="entry-label">00</p>
        <h1>WELCOME</h1>
        <div class="entry-subcopy">
          <strong>Portfolio</strong>
        </div>
      </div>

      <div class="entry-visual">
        <div class="entry-circle"></div>
        <div class="entry-character entry-character-image">
          <img src="assets/images/Slay.png" alt="Illustration d'accueil">
        </div>

        <a class="entry-button" href="chapters.html" id="enterButton">
          <span>Enter</span>
        </a>
      </div>

      <div class="entry-copy entry-copy-right entry-japanese">
        <span>START</span>
        <span>PORTFOLIO</span>
        <span>ENTRY</span>
      </div>
    </section>
  </main>

  <script src="assets/js/script.js"></script>
</body>
</html>
